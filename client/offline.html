<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMB Simulator - Offline</title>
     <!-- PWA Meta Tags -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="JAMB Simulator">
<link rel="apple-touch-icon" href="/icons/icon-152x152.png">
<meta name="theme-color" content="#667eea">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .offline-container {
            max-width: 500px;
            width: 100%;
        }

        .offline-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.5s ease;
        }

        .offline-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: float 3s infinite ease-in-out;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 2rem;
        }

        p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .offline-actions {
            display: grid;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .offline-features {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .feature-badges {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .badge {
            background: #e8f0fe;
            color: #4a6fa5;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #e74c3c;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (max-width: 480px) {
            .offline-card {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-card">
            <div class="offline-icon">📴</div>
            
            <h1>You're Offline</h1>
            
            <p>
                <span class="status-dot"></span>
                No internet connection detected
            </p>
            
            <p style="color: #666; margin-top: 10px;">
                Don't worry! You can still access your cached content:
            </p>
            
            <div class="offline-features">
                <div class="feature-badges">
                    <span class="badge">📚 Flashcards</span>
                    <span class="badge">📊 Progress</span>
                    <span class="badge">🏆 Achievements</span>
                    <span class="badge">🧮 Calculator</span>
                </div>
            </div>
            
            <div class="offline-actions">
                <button onclick="goToHome()" class="btn btn-primary">
                    📚 Go to Home (Offline Mode)
                </button>
                
                <button onclick="checkConnection()" class="btn btn-secondary">
                    🔄 Retry Connection
                </button>
                
                <a href="/flashcards.html" class="btn btn-secondary">
                    📇 Study Flashcards
                </a>
                
                <a href="/calculator.html" class="btn btn-secondary">
                    🧮 Use Calculator
                </a>
            </div>
            
            <p style="margin-top: 25px; color: #999; font-size: 0.9rem;">
                Your progress will sync automatically when you're back online
            </p>
        </div>
    </div>

    <script>
        function goToHome() {
            window.location.href = '/home.html';
        }
        
        function checkConnection() {
            if (navigator.onLine) {
                window.location.reload();
            } else {
                alert('Still offline. Please check your internet connection.');
            }
        }
        
        // Register for online event
        window.addEventListener('online', function() {
            alert('✅ You're back online! Syncing your data...');
            window.location.reload();
        });
    </script>
</body>
</html>
